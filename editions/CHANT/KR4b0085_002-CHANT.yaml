body:
  text: 卷二上表請開獻書之路上表請開獻書之路經籍所興由來尚矣爻畫肇于庖羲文字生于倉頡聖人所以弘宣教導博通古今揚于王庭肆于時夏故堯稱至聖猶考古道而言舜其大智尚觀古人之象周官外史掌三皇五帝之書及四方之志武王問黃帝顓頊之道太公曰在丹書是知握符御厤有國有家者曷嘗不以詩書而為教因禮樂而成功也昔周德既衰舊經紊棄孔子以大聖之才開素王之業憲章祖述制禮刊詩正五始而修春秋闡十翼而弘易道治國立身作範垂法及秦皇馭㝢吞滅諸侯任用威力事不師古始下焚書之令行偶語之刑先王墳籍掃地皆盡本既先亡從而顛覆臣以圖讖言之經典盛衰信有徵數此則書之一厄也漢興改秦之弊敦尚儒術建藏書之筴置校書之官屋壁山巖往往閒出外有太常太史之藏內有延閣祕書之府至孝成之世亡逸尚多遣謁者陳農求遺書于天下詔劉向父子讎校篇籍漢之典文于斯為盛及王莽之末長安兵起宮室圖書竝從焚燼此則書之二厄也光武嗣興尤重經誥未及下車先求文雅于是鴻生鉅儒繼踵而集懷經負帙不遠斯至肅宗親臨講肄和帝數幸書林其蘭臺石室鴻都東觀祕牒填委更倍于前及孝獻移都吏民擾亂圖書縑帛皆取為帷囊所收而西裁七十餘乘屬西京大亂一時燔蕩此則書之三厄也魏文代漢更集經典皆藏在祕書內外三閣遣祕書郎鄭默刪定舊文時之論者美其朱紫有別晉氏承之文籍尤廣晉祕書監荀勖定魏內經更著新簿雖古文舊𥳑猶云有缺新章後錄鳩集已多足得恢弘正道訓範當也屬劉石憑陵京華覆滅朝章國典從而失墜此則書之四厄也永嘉之後寇竊競興因河據洛跨秦帶趙論其建國立家雖傳名號憲章禮樂寂滅無聞劉裕平姚收其圖籍五經子史纔四千卷皆赤軸青紙文字古拙僭偽之盛莫過二秦以此而論足可用矣故知衣冠軌物圖畫記注播遷之餘皆歸江左晉宋之際學蓺為多齊梁之閒經史彌盛宋祕書丞王儉依劉氏七略撰為七志梁人阮孝緒亦為七錄總其書數三萬餘卷及侯景渡江破滅梁室祕省經籍雖從兵火其文德殿內書史宛然猶存蕭繹據有江陵遣將破平侯景收文德之書及公私典籍重本七萬餘卷悉送荊州故江表圖書因斯盡萃于繹矣及周師入郢繹悉焚之于外城所收十纔一二此則書之五厄也後魏爰自幽方遷宅伊洛日不暇給經籍闕如周氏創基關右戎車末息保定之始書止八千後加收集方盈萬卷高氏據有山東初亦采訪驗其本目殘缺尤多及東夏初平獲其經史四部重雜三萬餘卷所益舊書五千而已今御書單本合一萬五千餘卷部帙之閒仍有殘缺比梁之舊目止有其半至于陰陽河洛之篇醫方圖譜之說彌復為少臣以經書自仲尼已後迄于當今年踰千載數遭五厄興集之期屬膺聖世伏惟陛下受天明命君臨區宇功無與二德冠往初自華夏分離彝倫攸斁其閒雖霸王遞起而世難未夷欲崇儒業時或未可今土宇邁于三王民黎盛于兩漢有人有時正在今日方當大弘文教納俗升平而天下圖書尚有遺逸非所以仰協聖情流訓無窮者也臣史籍是司寢興懷懼昔陸賈奏漢祖云天下不可馬上治之故知經邦立政在于典謨矣為國之本莫此攸先今祕藏見書亦足披覽但一時載籍須令大備不可王府所無私家乃有然士民殷雜求訪難知縱有知者多懷恡惜必須勒之以天威引之以微利若猥發明詔兼開購賞則異典必臻觀閣斯積重道之風超于前世不亦善乎伏願天鑒少垂照察隋書牛弘傳北史牛弘傳又見御覽六百十九奏請定典禮奏請定典禮聖教陵替國章殘缺漢晉為法隨俗因時未足經國庇人弘風施化且制禮作樂事歸元首江南王儉偏隅一臣私撰儀注多違古法就廬非東階之位凶門豈設重之禮兩蕭累代舉國遵行後魏及齊風牛本隔殊不尋究遙相師祖故山東之人浸以成俗西魏已降師旅弗遑賓嘉之禮盡未詳定今休明啟運憲章伊始請據前經革茲俗弊隋書禮儀志三開皇初高祖思定典禮太常卿牛弘奏詔曰可奏著喪紀令正一品薨則鴻臚卿監護喪事司儀令示禮制二品以上則鴻臚丞監護司儀丞示禮制五品以上薨卒及三品以上有周親以上喪竝掌儀一人示禮制官人在職喪聽斂以朝服有封者斂以冕服未有官者白袷單衣婦人有官品者亦以其服斂內不得置金銀珠玉通典八十四奏請修緝雅樂奏請修緝雅樂臣聞周有六代之樂至韶武而已秦始皇改周舞曰五行漢高帝改韶舞曰文始以示不相襲也又造武德自表其功故高帝廟奏武德文始五行之舞又作昭容禮容增演其意昭容生于武德蓋猶古之韶也禮容生于文始矯秦之五行也文帝又作四時之舞故孝景帝立追述先功采武德舞作昭德舞被之管弦薦于太宗之廟孝宣采昭德舞為盛德舞更造新歌薦于武帝之廟據此而言遞相因襲縱有改作竝宗于韶至明帝時東平獻王采文德舞為大武之舞薦于光武之廟漢末大亂樂章淪缺魏武平荊州獲杜夔以為軍謀祭酒使創雅樂時散騎侍郎鄧靜善詠雅歌樂師尹胡能習宗祀之曲舞師馮肅曉知先代諸舞總練研精復于古樂自夔始也文帝黃初改昭容之樂為昭業樂武德之舞為武頌舞文始之舞為大韶舞五行之舞為大武舞明帝初公卿奏上太祖武皇帝樂曰武始之舞高祖文皇帝樂曰咸熙之舞又製樂舞名曰章斌之舞有事于天地宗廟及臨朝大饗竝用之晉武帝泰始二年遣傅玄等造行禮及上壽食舉歌詩張華表曰案漢魏所用雖詩章辭異興廢隨時至其韻逗曲折竝繫于舊一皆因襲不敢有所改也九年荀勖典樂使郭夏宋識造正德大豫之舞改魏昭武舞曰宣武舞羽籥舞曰宣文舞江左之初典章堙紊賀循為太常卿始有登歌之樂大寍末阮孚等又增益之咸和閒鳩集遺逸鄴沒胡後樂人頗復南度東晉因之以具鍾律太元閒破符永固又獲樂工楊蜀等閑練舊樂于是金石始備尋其設懸音調竝與江左是同慕容垂破慕容永于長子盡獲符氏舊樂垂息為魏所敗其鍾律令李佛等將太樂細伎奔慕容德于鄴德遷都廣固子超嗣立其母先沒姚興超以太樂伎一百二十人詣興贖母及宋武帝入關悉收南度永初元年改正德舞曰前舞大武舞曰後舞文帝元嘉九年太樂令鍾宗之更調金石至十四年典書令奚縱復改定之又有凱容宣業之舞齊代因而用之蕭子顯齊書志曰宋孝建初朝議以凱容舞為韶舞宣業舞為武德舞據韶為言宣業即是古之大武非武德也故志有前舞凱容歌辭後舞凱容歌辭者矣至于梁初猶用凱容宣業之舞後改為大壯大觀焉今人猶喚大觀為前舞故知樂名雖隨代而改聲韻曲折理應常同前克荊州得梁家雅曲今平蔣州又得陳氏正樂史傳相承以為合古且觀其曲體用聲有次請修緝之以備雅樂其後魏洛陽之曲據魏史云太武平赫連昌所得更無明證後周所用者皆是新造雜有邊裔之聲戎音亂華皆不可用請悉停之隋書音樂志下開皇九年平陳獲宋齊舊樂由是牛弘奏奏言雅樂定奏言雅樂定臣聞蕢桴土鼓由來斯尚雷出地奮著自易經邃古帝王經邦馭物揖讓而臨天下者禮樂之謂也秦焚經典樂書亡缺爰至漢興始加鳩採祖述增廣緝成朝憲魏晉相承更加論討沿革之宜備于故實永嘉之後九服崩離燕石符姚遞據華土此其戎乎何必伊川之上吾其左衽無復微管之功前言往式于斯而盡金陵建社朝士南奔帝則皇規粲然更備與內原隔絕三百年于茲矣伏惟明聖膺期會昌在運今南征所獲梁陳樂人及晉宋旗章宛然俱至曩代所不服者今悉服之前朝所未得者今悉得之化洽功成于是乎在臣等伏奉明詔詳定雅樂博訪知音旁求儒彥研校是非定其去就取為一代正樂具在本司隋書音樂志下十四年樂定牛弘姚察許善心虞世基劉臻等奏依古制修立明堂議依古制修立明堂議竊謂明堂者所以通神靈感天地出教化崇有德孝經曰宗祀文王于明堂以配上帝祭義云祀于明堂教諸侯孝也黃帝曰合宮堯曰五府舜曰總章布政興治由來尚矣周官考工記曰夏后氏世室堂脩二七廣四脩一鄭玄注云脩十四步其廣益以四分脩之一則堂廣十七步半也殷人重屋堂脩七尋四阿重屋鄭云其脩七尋廣九尋也周人明堂度九尺之筵南北七筵五室凡室二筵鄭云此三者或舉宗廟或舉正寢或舉明堂互言之明其同制也馬融王肅干寶所注與鄭亦異今不具出漢司徒馬宮議云夏后氏世室室顯于堂故命以室殷人重屋屋顯于堂故命以屋周人明堂堂大于夏室故命以堂夏后氏益其堂之廣百四十四尺周人明堂以為兩序閒大夏后氏七十二尺若據鄭玄之說則夏室大于周堂如依馬宮之言則周堂大于夏室後王轉文周大為是但宮之所言未詳其義此皆去聖久遠禮文殘缺先儒解說家異人殊鄭注玉藻亦云宗廟路寢與明堂同制王制曰寢不踰廟明大小是同今依鄭玄注每室及堂止有一丈八尺四壁之外四尺有餘若以宗廟論之祫享之時周人旅酬六尸并后稷為七先公昭穆二尸先王昭穆二尸合十一尸三十六王及君北面行事于二丈之堂愚不及此若以正寢論之便須朝宴據燕禮諸侯宴則賓及卿大夫脫屨升坐是知天子宴則三公九卿竝須升堂燕義又云席小卿次上卿言皆侍席止于二筵之閒豈得行禮若以明堂論之總享之時五帝各于其室設青帝之位須于木室之內少北西面太昊從食坐于其西近南北面祖宗配享者又于青帝之南稍退西面丈八之室神位有三加以簠簋籩豆牛羊之俎四海九州美物咸設復須席上升歌出罇反坫揖讓升降亦以隘矣據茲而說近是不然案劉向別錄及馬宮蔡邕等所見當時有古文明堂禮王居明堂禮明堂圖明堂大圖明堂陰陽太山通義魏文侯孝經傳等竝說古明堂之事其書皆亡莫得而正今明堂月令者鄭玄云是呂不韋著春秋十二紀之首章禮家鈔合為記蔡邕王肅云周公所作周書內有月令第五十三即此也各有證明文多不載束晳以為夏時之書劉瓛云不韋鳩集儒者尋于聖王月令之事而記之不韋安能獨為此記今案不得全稱周書亦未可即為秦典其內雜有虞夏殷周之法皆聖王仁恕之政也蔡邕具為章句又論之曰明堂者所以宗祀其祖以配上帝也夏后氏曰世室殷人曰重屋周人曰明堂東曰青陽南曰明堂西曰總章北曰玄堂中曰太室聖人南面而聽向明而治人君之位莫不正焉故雖有五名而主以明堂也制度之數各有所依堂方一百四十四尺巛之策也屋圓楣徑二百一十六尺乾之策也太廟明堂方六丈通天屋徑九丈陰陽九六之變且圓蓋方覆九六之道也八闥以象卦九室以象州十二宮以應日辰三十六戶七十二牖以四戶八牖乘九宮之數也戶皆外設而不閉示天下以不藏也通天屋高八十一尺黃鍾九九之實也二十八柱布四方四方七宿之象也堂高三尺以應三統四向五色各象其行外廣二十四丈象二十四氣于外以象四海王者之大禮也觀其模範天地則象陰陽必據古文義不虛出今若直取考工不參月令青陽總章之號不得而稱九月享帝之禮不得而用漢代二京所建與此說悉同建安之後海內大亂京邑焚燒憲章泯絕魏氏三方未平無聞興造晉則侍中裴頠議曰尊祖配天其義明著而廟宇之制理據未分宜可直為一殿以崇嚴父之祀其餘雜碎一皆除之宋齊已還咸率茲禮此乃世乏通儒時無思術前王盛事于是不行後魏代都所造出自李沖三三相重合為九室簷不覆基房閒通街穿鑿處多迄無可取及遷宅洛陽更加營構五九紛競遂至不成宗配之事于焉靡託今皇猷遐闡化覃海外方建大禮垂之無窮弘等不以庸虛謬當議限今檢明堂必須五室者何尚書帝命驗曰帝者承天立五府赤曰文祖黃曰神斗白曰顯紀黑曰玄矩蒼曰靈府鄭玄注曰五府與周之明堂同矣且三代相沿多有損益至于五室確然不變夫室以祭天天實有五若立九室四無所用布政視朔自依其辰鄭司農云十二月分在青陽等左右之位不云居室鄭玄亦言每月于其時之堂而聽政焉禮圖畫个皆在堂偏是以須為五室明堂必須上圓下方者何孝經援神契曰明堂者上圓下方八窗四達布政之宮禮記盛德篇曰明堂四戶八牖上圓下方五經異義稱講學大夫淳于登亦云上圓下方鄭玄同之是以須為圓方明堂必須重屋者何案考工記夏言九階四旁兩夾窗門堂三之二室三之一殷周不言者明一同夏制殷言四阿重屋周承其後不言屋制亦盡同可知也其殷人重屋之下本無五室之文鄭注云五室者亦據夏以知之明周不云重屋因殷則有灼然可見禮記明堂位曰太廟天子明堂言魯為周公之故得用天子禮樂魯之太廟與周之明堂同又曰複廟重檐刮楹達嚮天子之廟飾鄭注複廟重屋也據廟既重屋明堂亦不疑矣春秋文公十三年太室屋壞五行志曰前堂曰太廟中央曰太室屋其上重者也服虔亦云太室太廟太室之上屋也周書作洛篇曰乃立太廟宗宮路寢明堂咸有四阿反坫重亢重廊孔晁注曰重亢累棟重廊累屋也依黃圖所載漢之宗廟皆為重屋此去古猶近遺法尚在是以須為重屋明堂必須為辟廱者何禮記盛德篇云明堂者明諸侯尊卑也外水曰辟廱明堂陰陽錄曰明堂之制周圜行水左旋以象天內有太室以象紫宮此明堂有水之明文也然馬宮王肅以為明堂辟廱太學同處蔡邕盧植亦以為明堂靈臺辟廱太學同實異名邕云明堂者取其宗祀之清貌則謂之清廟取其正室則曰太室取其堂則曰明堂取其四門之學則曰太學取其周水圜如璧則曰璧廱其實一也其言別者五經通義曰靈臺以望氣明堂以布政辟廱以養老教學三者不同袁準鄭玄亦以為別歷代所疑豈能輒定今據郊祀志云欲制明堂未曉其制濟南人公玉帶上黃帝時明堂圖一殿無壁蓋之以茅水圜宮垣天子從之以此而言其來則久漢中元二年起明堂辟廱靈臺于洛陽竝別處然明堂亦有璧水李尤明堂銘曰流水洋洋是也以此須有辟廱夫帝王作事必師古昔今造明堂須以禮經為本形制依于周法度數取于月令遺闕之處參以餘書庶使該詳沿革之理其五室九階上圓下方四阿重屋四旁兩門依考工記孝經說堂方一百四十四尺屋圓楣徑二百一十六尺太室方六丈通天屋徑九丈八闥二十八柱堂高三尺四向五色依周書月令論殿垣方在內水周如外水內徑三百步依太山盛德記覲禮經仰觀俯察皆有則象足以盡誠上帝祗配祖宗弘風布教作範于後矣弘等學不稽古輒申所見可否之宜伏聽裁擇隋書牛弘傳又見北史七十二樂議謹案禮五聲六律十二管還相為宮周禮奏黃鍾歌大呂奏太簇歌應鍾皆是旋相為宮之義蔡邕明堂月令章句曰孟春月則太簇為宮姑洗為商蕤賓為角南呂為徵應鍾為羽大呂為變宮夷則為變徵他月倣此故先王之作律呂也所以辨天地四方陰陽之聲揚子雲曰聲生于律律生于辰故律呂配五行通八風歷十二辰行十二月循環轉運義無停止譬如立春木王火相立夏火王土相季夏餘分土王金相立秋金王水相立冬水王木相還相為宮者謂當其王月名之為宮今若十一月不以黃鍾為宮十三月不以太簇為宮便是春木不王夏土不相豈不陰陽失度天地不通哉劉歆鍾律書云春宮秋律百卉必彫秋宮春律萬物必榮夏宮冬律雨雹必降冬宮夏律雷乃發聲以斯而論誠為不易且律十二今直為黃鍾一均唯用七律以外五律竟復何施恐失聖人制作本意故須依禮作還相為宮之法隋書牛弘傳又北史七十二更共姚察許善心劉臻虞世基等詳議更共姚察許善心劉臻虞世基等詳議後周之時以四聲降神雖采周禮而年代深遠其法久絕不可依用謹案司樂凡樂圜鍾為宮黃鍾為角太簇為徵姑洗為羽舞雲門以祭天函鍾為宮太簇為角姑洗為徵南呂為羽舞咸池以祭地黃鍾為宮大呂為角太簇為徵圜鍾為羽舞韶以祀宗廟馬融曰圜鍾應鍾也賈逵鄭玄曰圜鍾夾鍾也鄭玄又云此樂無商聲祭尚柔剛故不用也干寶云不言商商為臣王者自謂故置其實而去其名若曰有天地人物無德以主之謙以自牧也先儒解釋既莫知適從然此四聲非直無商又律管乖次以其為樂無克諧之理今古事異不可得而行也案東觀書馬防傳太子丞鮑鄴等上作樂事下防防奏言建初二年七月鄴上言天子食飲必順于四時五味而有食舉之樂所以順天地養神明求福應也今官雅樂獨有黃鍾而食舉樂但有太簇皆不應月律恐傷氣類可作十二月均各應其月氣公卿朝會得聞月律乃能感天和氣宜應詔下太常評焉太常上言作樂器直錢百四十六萬奏寖今明詔復下臣防以為可須上天之明時因歲首之嘉月發太簇之律奏雅頌之音以迎和氣其條貫甚具遂獨施行起于十月為迎氣之樂矣又順帝紀云陽嘉二年冬十月庚午以春秋為辟雍隸太學隨月律十月作應鍾三月作姑洗元和以來音戾不調修復黃鍾作樂器如舊典據此而言漢樂宮懸有黃鍾均食舉太簇均止有二均不旋相為宮亦以明矣計從元和至陽嘉二年纔五十歲用而復止驗黃帝聽鳳以制律呂尚書曰予欲聞六律五聲周禮有分樂而祭此聖人制作以合天地陰陽之和自然之理乃云音戾不調斯言誣之甚也今梁陳雅曲竝用宮聲案禮五聲十二律還相為宮盧植云十二月三管流轉用事當用事者為宮宮君也鄭玄曰五聲宮商角徵羽其陽管為律陰管為呂布十二辰更相為宮始自黃鍾終于南呂凡六十也皇侃疏還相為宮者十一月以黃鍾為宮十二月以大呂為宮正月以太簇為宮餘月放此凡十二管各備五聲合六十聲五聲成一調故十二調此即釋鄭義之明文無用商角徵羽為別調之法矣樂稽耀嘉曰東方春其聲角樂當宮于夾鍾餘方各以其中律為宮若有商角之理不得云宮于夾鍾也又云五音非宮不調五味非甘不和又動聲儀宮唱而商和是謂善本太平之樂也周禮奏黃鍾歌大呂以祀天神鄭玄以黃鍾之鍾大呂之聲為均均調也故崔靈恩云六樂十二調亦不獨論商角徵羽也又云凡六樂者皆文之以五聲播之以八音故知每曲皆須五聲八音錯綜而能成也禦寇子云師文鼓琴命宮而總四聲則慶雲浮景風翔唯韓詩云聞其宮聲使人溫厚而寬大聞其商聲使人方廉而好義及古有清角清徵之流此則當聲為曲今以五引為五聲迎氣所用者是也餘曲悉用宮聲不勞商角徵羽何以得知荀勖論三調為均首者得正聲之名明知雅樂悉在宮調以外徵羽角自為謠俗之音耳且西涼龜茲雜伎等曲數既多故得隸于眾調調各別曲至如雅樂少須以宮為本歷十二均而作不可分配餘調更成雜亂也隋書音樂志下牛弘及祕書丞姚察通直散騎常侍許善心儀同三司劉臻通直郎虞世基等更共詳議又論六十律不可行又論六十律不可行謹案續漢書律厤志元帝遣韋玄成問京房于樂府房對受學故小黃令焦延壽六十律相生之法以上生下皆三生二以下生上皆三生四陽下生陰陰上生陽終于中呂而十二律畢矣中呂上生執始執始下生去滅上下相生終于南事六十律畢矣十二律之變至于六十猶八卦之變至于六十四也冬至之聲以黃鍾為宮太簇為商姑洗為角林鍾為徵南呂為羽應鍾為變宮蕤賓為變徵此聲氣之元五音之正也故各統一日其餘以次運行當日者各自為宮而商徵以類從焉房又曰竹聲不可以度調故作準以定數準之狀如瑟長一丈而十三絃隱閒九尺以應黃鍾之律九寸中央一絃下畫分寸以為六十律清濁之節執始之類皆房自造房云受法于焦延壽未知延壽所承也至元和元年待詔候鍾律殷彤上言官無曉六十律以準調音者故待詔嚴崇具以準法教其子宣願召宣補學官主調樂器太史丞弘試宣十二律其二中其四不中其六不知何律宣遂罷自此律家莫能為準施絃熹平六年東觀召典律者太子舍人張光問準意光等不知歸閱舊藏乃得其器形制如房書猶不能定其絃緩急故史官能辨清濁者遂絕其可以相傳者唯大榷常數及候氣而已據此而論京房之法漢世已不能行沈約宋志曰詳案古典及今音家六十律無施于樂禮云十二管還相為宮不言六十封禪書云大帝使素女鼓五十絃瑟而悲破為二十五絃假令六十律為樂得成亦所不用取大樂必易大禮必𥳑之意也隋書牛弘傳北史七十二又議又議案周官云大司樂掌成均之法鄭眾注曰均調也樂師主調其音三禮義宗稱周官奏黃鍾者用黃鍾為調歌大呂者用大呂為調奏者謂堂下四縣歌者謂堂上所歌但以一祭之閒皆用二調是知據宮稱調其義一也明六律六呂迭相為宮各自為調今見行之樂用黃鍾之宮乃以林鍾為調與古典有違案晉中書監荀勖依典記以五聲十二律還相為宮之法制十二笛黃鍾之笛正聲應黃鍾下徵應林鍾以姑洗為清角大呂之笛正聲應大呂下徵應夷則以外諸均例皆如是然今所用林鍾是勖下徵之調不取其正先用其下于理未通故須改之北史七十二
