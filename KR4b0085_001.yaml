  text: 卷一奉和冬至乾陽殿受朝應詔奉和冬至乾陽殿受朝應詔恭已臨萬宇宸居御八埏作貢菁茅集來朝圭黻連司儀三揖盛掌禮九賓虔重欄映如璧復殿繞非煙初學記十四古今歲時雜詠三十九作奉和冬至日乾陽殿受朝應制文苑英華百七十五作奉和冬至日乾元殿受朝詩紀百二十
